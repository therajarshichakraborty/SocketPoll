version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulseboard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulseboard
      POSTGRES_PASSWORD: pulseboard_secret
      POSTGRES_DB: pulseboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseboard -d pulseboard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
